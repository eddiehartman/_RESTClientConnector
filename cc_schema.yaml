              properties:
                file:
                  type: string
                  format: binary
                  description: Excel file containing data to import
            encoding:
              file:
                contentType: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel
      responses:
        "200":
          description: File uploaded and processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: File processed successfully
                  recordsProcessed:
                    type: integer
                    example: 150
                  importId:
                    type: string
                    example: import_12345
        "400":
          description: Bad request - Invalid file or format
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Invalid file format. Please upload an Excel file.
        "413":
          description: File too large
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: File size exceeds maximum limit
