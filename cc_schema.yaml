      x-swagger-router-controller: Training
  /training/my-courses/{courseSlug}/chat-group:
    get:
      tags:
        - Participant
      description: Returns the URL of the chat group associated with the user's cohort course.
      operationId: getChatGroupDetails
      parameters:
        - name: courseSlug
          in: path
