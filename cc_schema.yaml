      operationId: sendMessageToParticipants
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposes
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - participantExternalIds
                - messageContent
              properties:
                participantExternalIds:
                  description: List of participants externalIds (User.externalId)
                  type: array
                  minItems: 1
                  items:
                    type: string
                messageContent:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationMessage"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - LOCAL_BUYER
      x-swagger-router-controller: NotificationsController
  /swagger:
    x-swagger-pipe: swagger_raw
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      required:
        - message
      type: object
      properties:
        message:
          type: string
    ConfirmationMessage:
      required:
        - message
      type: object
      properties:
        message:
          type: string
      description: Send a confirmation string
      example:
        message: message
    UserInfo:
      type: object
      properties:
        userId:
          type: string
        programId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        smsOptedout:
          type: boolean
          nullable: true
        email:
          type: string
          nullable: true
        district:
          type: string
        subdistrict:
          type: string
        userRoles:
          type: array
          items:
            type: string
          description: Roles set to the user. Farmers have this role set to 'PARTICIPANT' when enrolled by back office. Read-only.
        firstAccessDate:
          type: string
          format: date-time
          description: First access date to the mobile app by this user. Read-only.
        lastAccessDate:
          type: string
          format: date-time
          description: Last access date to the mobile app by this user. Read-only.
        enrollDate:
          type: string
          description: Date recorded when user is created in back office. Read-only.
        accountDisabled:
          type: boolean
          description: This user does not appear in farmer list when this field is set to true. So it is a "write-only" field for the instructor.
        accountExcludedFromMonitoring:
          type: boolean
          description: This user does not appear in Reporting Dashboard when this field is set to true. So it is a "write-only" field for the instructor.
        photo:
          type: string
          description: base-64 encoded picture of the user, e.g "data:image/png;base64, iVBORw0KGgoA..."
          nullable: true
        photoFilename:
          type: string
          description: URL pointing to the picture of the user
          nullable: true
        nationalIdNumber:
          type: string
          nullable: true
      description: Information about user, returned when authentication succeeds.
    UserInfoWithToken:
      description: Bearer token returned upon participant identification, along with other user information.
      allOf:
        - $ref: "#/components/schemas/UserInfo"
        - type: object
          properties:
            token:
              type: string
    ForbiddenResponse:
      required:
        - message
      type: object
      properties:
        message:
          type: string
      description: Send a not forbidden message
      example:
        message: message
    NotFoundResponse:
      required:
        - message
      type: object
      properties:
        message:
          type: string
      description: Send a not found message
      example:
        message: message
    BooleanNumber:
      type: number
      enum:
        - 1
        - 0
      description: 0 for false and 1 for true, used in database
    ProgramConfiguration:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        configs:
          type: object
          properties:
            mainCommodity:
              type: string
            favicon:
              type: string
            logoSmall:
              type: string
            logoLarge:
              type: string
            welcomeSplashIcon:
              type: string
            timeZone:
              type: string
            pricesCheckingHour:
              type: string
            notificationsSendingHour:
              type: string
            posFarmerAssociationHour:
              type: string
            languages:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                  name:
                    type: string
                  flag:
                    type: string
            defaultLanguage:
              type: string
            phonePrefix:
              type: string
            priceLocale:
              type: string
            modules:
              type: array
              items:
                type: string
            addCourses:
              type: string
            fontFamily:
              type: string
            palette:
              type: object
            country:
              type: string
            districts:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
            subdistricts:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
            loginScreen:
              type: object
              properties:
                enrollmentUrl:
                  type: string
                forgotNumberUrl:
                  type: string
            splashScreens:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  img:
                    type: string
      description: Program's configuration
    ProgramManifest:
      type: object
      properties:
        short_name:
          type: string
        name:
          type: string
        icons:
          type: array
        start_url:
          type: string
        id:
          type: string
        display:
          type: string
        background_color:
          type: string
        theme_color:
          type: string
        scope:
          type: string
    DocDetails:
      required:
        - slug
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        imageUrl:
          type: string
        order:
          type: integer
      description: Details and identity of a course (or a chapter) in the CMS (icon, title…)
    ChatGroupDetails:
      type: object
      properties:
        url:
          type: string
          description: ""
          nullable: true
        provider:
          type: string
          description: ""
          nullable: true
      description: Object that describes details of a chat group in a cohort course
    CourseDoc:
      description: Details of a course, along with the details of its (ordered) chapters
      allOf:
        - $ref: "#/components/schemas/DocDetails"
        - type: object
          properties:
            chapters:
              type: array
              items:
                $ref: "#/components/schemas/DocDetails"
            summary:
              type: string
            chatGroupDetails:
              $ref: "#/components/schemas/ChatGroupDetails"
    SectionContent:
      description: Details of a Section, and HTML content of a section
      allOf:
        - $ref: "#/components/schemas/DocDetails"
        - type: object
          properties:
            content:
              type: string
    InstructorDetails:
      type: object
      properties:
        photo:
          type: string
        photoFilename:
          type: string
        name:
          type: string
      description: Photo and name of an instructor
    MediaDetails:
      required:
        - mediaUrl
      type: object
      properties:
        sectionId:
          type: string
        mediaUrl:
          type: string
      description: Media location, along with the section it belongs to.
    Answer:
      type: object
      properties:
        cmsId:
          type: string
        label:
          type: string
      description: Describes a possible answer for a closed question
    Question:
      type: object
      properties:
        cmsId:
          type: string
        title:
          type: string
        answerType:
          type: string
          description: Could be one of :'radio','checkbox','dropdown','text','number'
        label:
          type: string
        order:
          type: integer
        optional:
          type: boolean
          description: Set to true if answering may be skipped.
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
      description: Describes a question, along with its list of possible answers, if relevant
    Survey:
      type: object
      properties:
        cmsId:
          type: string
        title:
          type: string
        description:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      description: Describes a survey related to a course, along with its list of questions
    SurveyResult:
      type: object
      properties:
        order:
          type: integer
          description: used for sales transactions survey hack only
        questionCmsId:
          type: string
        inputDate:
          type: string
          description: date of user input (UTC stringified date-time)
        answer:
          type: string
          description: JSON string containing cms Id (single or array) of answer(s) to a question, or a textual string answer
      description: User inputs entered during a survey collect
    Coordinates:
      type: object
      nullable: true
      properties:
        type:
          type: string
          description: type of GEOJSON coordinates.
        coordinates:
          type: array
          items:
            type: number
            description: array of coordinates (longitude, latitude).
    Notification:
      type: object
      properties:
        id:
          type: number
          description: Read-only.
        receiver:
          type: integer
          description: Id from the receiver to send this notification to.
        type:
          type: string
          description: Type of notification (for example "price_change")
        status:
          type: string
          description: Status of notification (for example "to send" or "sent")
        level:
          type: string
          description: Level of notification (for example "alert")
        title:
          type: string
          description: Title of the notification
        body:
          type: string
          description: Body of the notification (json string)
        creationDate:
          type: string
          description: The date when this notification was created
        archived:
          $ref: "#/components/schemas/BooleanNumber"
          description: If the notification has been archived
        sentDate:
          type: string
          description: The date when this notification was sent as push notification
      description: Object describing Notification's details, when creating, updating and retrieving notification. Read-only fields are aimed to display only, and should not be sent on update/create.
    Buyer:
      description: Information about buyer.
      type: object
      properties:
        externalId:
          type: string
          description: External UUID of the buyer
        programId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        photoUrl:
          nullable: true
          type: string
    Price:
      type: object
      properties:
        id:
          type: string
          description: Read-only. Returned at price creation
        product:
          type: integer
          description: Id from the product which is linked to this price.
        pointOfSale:
          type: integer
          description: Id from the point of sale attached to this price.
        value:
          type: number
          description: Price's amount formatted as '00.00'
        currency:
          type: string
          description: Price's currency formatted as 'rp'
        startDate:
          type: string
          nullable: true
          description: The date when product's price is officially set to this value
        endDate:
          type: string
          nullable: true
          description: The date when this price is unset for a product
        creationDate:
          type: string
          description: The date when this price was create
        enabled:
          type: integer
          description: 0 if the price has already been set and is no longer available at this date, else 1
      description: Object describing Price's details, when creating, updating and listing prices. Read-only fields are aimed to display only, and should not be sent on update/create.
    Transaction:
      description: Information about Transaction.
      type: object
      properties:
        id:
          type: integer
        externalId:
          type: string
          nullable: true
