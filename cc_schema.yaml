      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: Collect
  /collect/getSurveysByUser:
    get:
      tags:
        - Participant
      description: Returns all surveys opened to a given user according to his/her participation to cohorts and opening state of survey.
      operationId: getSurveysByUser
      parameters:
        - name: user-id
          in: query
          required: true
          schema:
            type: string
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success, Upon return, collect identifies a context in which survey is collected, to be sent back with user data inputs'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    collect:
                      type: number
                    survey:
                      $ref: "#/components/schemas/Survey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: Collect
  /collect/getSurveyByCollect:
    get:
      tags:
        - Participant
      description: Returns the survey associated to a given collect, whatever the opening state of the collect.
      operationId: getSurveyByCollect
      parameters:
        - name: collect
          in: query
          required: true
          schema:
            type: string
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
