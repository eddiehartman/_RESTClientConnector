        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: Program
    put:
      tags:
        - Participant
      description: UNUSED ENDPOINT - Update program configuration
      deprecated: true
      operationId: updateProgramById
      parameters:
        - name: programId
          in: path
          description: Program id (must be positive)
          required: true
          schema:
            type: integer
            minimum: 0
        - name: jwtPayload
