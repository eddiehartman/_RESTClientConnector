            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: Program
  /library/{programId}/courses/{courseSlug}:
    get:
      tags:
        - Participant
      description: Returns a course description with chapter structure
      operationId: getCourseBySlug
      parameters:
        - name: programId
          description: Program Identifier (must be positive)
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
        - name: courseSlug
          description: Wordpress course slug
          in: path
          required: true
          schema:
            type: string
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDoc"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: Course
  /library/{programId}/courses/chapters/{chapterId}:
    get:
      tags:
        - Participant
      description: Returns the list of sections composing a given chapter
      operationId: getCourseChapterById
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
        - name: programId
          description: Program Identifier (must be positive)
          in: path
