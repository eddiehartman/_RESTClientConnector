        - ADMINISTRATOR
      x-swagger-router-controller: Program
  /program/{programId}/manifest:
    get:
      security: []
      tags:
        - Participant
      description: Get program's configuration 'manifest
      operationId: getManifestByProgramId
      parameters:
        - name: programId
