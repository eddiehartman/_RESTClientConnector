      x-swagger-router-controller: Training
  /library/{programId}/media/{chapterId}/{clientScreenWidth}/{clientScreenDensity}:
    get:
      tags:
        - Participant
      description: Returns the list of all medias referenced inside each section composing a given chapter.
      operationId: getChapterMedias
      parameters:
        - name: chapterId
          in: path
          required: true
          schema:
            type: string
        - name: programId
          in: path
          required: true
          description: Program Id (must be positive)
          schema:
            type: integer
            minimum: 0
        - name: clientScreenWidth
          in: path
          required: true
          schema:
            type: string
        - name: clientScreenDensity
          in: path
          required: true
