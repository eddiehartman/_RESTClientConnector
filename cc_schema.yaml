      description: Returns the details of the instructor, for a given course slug and user
      operationId: getInstructorDetails
      parameters:
        - name: courseSlug
          in: path
          description: Course trained by the instructor to the user's cohort
          required: true
          schema:
            type: string
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructorDetails"
        "404":
