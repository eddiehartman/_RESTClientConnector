openapi: 3.0.3
info:
  title: Sutti-Server
  version: 3.1.0-IF002
servers:
  - url: https://backend.sutti.app
security:
  - Bearer: []
tags:
  - name: Participant
    description: Endpoints for the Participant mobile application.
  - name: BackOffice
    description: Endpoints for the Backoffice tooling.
  - name: Buyer App
    description: Endpoints consumed by the Buyer mobile application.
paths:
  /hello:
    get:
      security: []
      tags:
        - Participant
      description: Returns 'Hello' to the caller
      operationId: hello
      parameters:
        - name: name
          in: query
          description: The name of the person to whom to say hello
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationMessage"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: Hello
  /user/signIn:
    post:
      security: []
      tags:
        - Participant
      description: Returns the jwt token if participant code is valid.
      operationId: signIn
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                programId:
                  type: number
                code:
                  type: string
                user-agent:
                  type: string
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoWithToken"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-router-controller: User
  /user/refreshToken:
    get:
      tags:
        - Participant
      description: Check token and return a refreshed token.
      operationId: refreshToken
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoWithToken"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: User
  /user/getProfileData:
    get:
      tags:
        - Participant
      description: Get User info .
      operationId: getProfileData
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: User
  /user/updateProfileData:
    put:
      tags:
        - Participant
      description: Update participant data in profile managment
      operationId: updateProfileData
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationMessage"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: User
  /user/updateLastAccessDate:
    put:
      tags:
        - Participant
      description: Update the last access date
      operationId: updateLastAccessDate
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userAgent:
                  type: string
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationMessage"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: User
  /user/sendPushInfo:
    put:
      tags:
        - Participant
      description: Send a json payload with information on how to reach the user endpoint to push notifications
      operationId: sendPushInfo
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                optedIn:
                  $ref: "#/components/schemas/BooleanNumber"
                pushURL:
                  type: string
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationMessage"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: User
  /user/updateOptedIn:
    put:
      tags:
        - Participant
      description: Whether a participant opted in for notifications or not and its pushURL if opted in
      operationId: updateOptedIn
      deprecated: true
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                optedIn:
                  $ref: "#/components/schemas/BooleanNumber"
                pushURL:
                  type: string
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmationMessage"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - PARTICIPANT
      x-swagger-router-controller: User
  /programs:
    get:
      security: []
      tags:
        - Participant
      description: Get all program configuration
      operationId: getAllPrograms
      responses:
        "200":
