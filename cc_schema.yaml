      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Object that describres details of a course in a cohort
              properties:
                transactionType:
                  type: string
                  description: Transaction context/type (buyer transaction vs in-kind distribution)
                  enum:
                    - crop_purchase
                    - inkind_contribution_distribution
                pointOfSaleId:
                  type: integer
                  description: Id of the Point Of Sale for the Transacation
                farmerExternalId:
                  type: string
                  description: External UUID of the farmer
                productId:
                  type: integer
                  description: Id of the Product for the Transacation
                productName:
                  type: string
                  description: Name of the Product for the Transacation
                quantityUnit:
                  type: string
                  description: Unit of the Product for the Transacation
                quantity:
                  type: number
                  description: Quantity of Product (measured in quantityUnit) for the Transacation
                pricePerUnit:
                  type: number
                  description: Price per quantityUnit for the Transacation
                totalPrice:
                  type: number
                  description: Total Price for the Transacation
                currency:
                  type: string
                  description: Price's currency formatted as rp
                isOfflineTransaction:
                  type: boolean
                  description: offline (with picutre upload) or online (i.e in person)
                offlineTransactionProofUrl:
                  type: string
                  description: Base64-encoded image used as proof for offline transactions. isOfflineTransaction should be true.
                unilateralyDeclared:
                  type: boolean
                  description: Whether the transaction was unilaterally declared by the buyer.
