      x-swagger-router-controller: Training
  /user/trainingTutorials:
    post:
      tags:
        - Participant
      description: Assign Sutti App tutorial to all participant
      operationId: AddTutorialToUsers
      parameters:
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-swagger-roles:
        - ADMINISTRATOR
      x-swagger-router-controller: User
  /training/my-courses/{courseSlug}/allowed-chapters:
    get:
      tags:
        - Participant
      description: Returns the list of chapter ids allowed to a user, for a given course slug.
      operationId: getAllowedChapters
      parameters:
        - name: courseSlug
          in: path
          description: Course trained to the user's cohort
          required: true
          schema:
            type: string
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
