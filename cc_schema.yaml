      x-swagger-router-controller: TermsAndConditions
  /collect/getSurveyBySlug:
    get:
      tags:
        - Participant
      description: Returns a survey description along with its questions and proposed answers if so.
      operationId: getSurveyBySlug
      parameters:
        - name: survey-slug
          in: query
          description: The slug of the impact survey.
          required: true
          schema:
            type: string
        - name: jwtPayload
          in: header
          description: JWT payload - For generator purposed
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
